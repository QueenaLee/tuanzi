<!-- 通用页面集合: home / result -->
<template id="tpl-home">
  <div class="home-hero">
    <span class="mascot">🦉</span>
    <h1>小小<span>学习</span>家</h1>
    <p>选择学科，直接开始学习！</p>
  </div>
  <!-- ── 学科 TAB 导航 ── -->
  <div class="home-subject-tabs" id="home-subject-tabs">
    <div class="home-subject-tab active" onclick="switchSubjectTab('english')" data-tab="english">
      <span class="tab-icon">🇺🇸</span>英语
    </div>
    <div class="home-subject-tab" onclick="switchSubjectTab('pinyin')" data-tab="pinyin">
      <span class="tab-icon">拼</span>拼音
    </div>
    <div class="home-subject-tab" onclick="switchSubjectTab('chinese')" data-tab="chinese">
      <span class="tab-icon">字</span>汉字
    </div>
    <div class="home-subject-tab" onclick="switchSubjectTab('math')" data-tab="math">
      <span class="tab-icon">🔢</span>数学
    </div>
  </div>
  <!-- ══ TAB: 英语 ══ -->
  <div class="home-tab-panel active" id="tab-english">
    <div class="subject-modules" style="padding-top:16px">
      <div class="module-card full" style="background:linear-gradient(135deg,#FFF8E0,#FFE8A0,#E8FFF0);border-color:#FFD700;" onclick="showPage('word-flash')">
        <span class="mc-icon">📚⚡</span>
        <div class="mc-label" style="color:#B07800;">边学边记</div>
        <div class="mc-desc">点单词卡 → 一键速记，读完自动返回</div>
      </div>
      <div class="module-card" style="background:linear-gradient(135deg,#E8F4FF,#D0E8FF);border-color:#85BEF5;" onclick="startQuiz()">
        <span class="mc-icon">🎯</span>
        <div class="mc-label" style="color:var(--blue);">看词选图</div>
        <div class="mc-desc">认对了加星</div>
      </div>
      <div class="module-card" style="background:linear-gradient(135deg,#F0FFE8,#DDFFC8);border-color:#90E080;" onclick="startMatch()">
        <span class="mc-icon">🧩</span>
        <div class="mc-label" style="color:var(--green);">配对消除</div>
        <div class="mc-desc">连连看，全消掉！</div>
      </div>
    </div>
    <div class="subject-modules">
      <div class="module-card" style="background:linear-gradient(135deg,#E8F4FF,#C8EEFF);border-color:#70C8F0;" onclick="goPhonicsLetters()">
        <span class="mc-icon">🔤</span>
        <div class="mc-label" style="color:#0060A0;">字母&组合发音</div>
        <div class="mc-desc">A-Z 发音 · sh ch th · 字母组合</div>
      </div>
      <div class="module-card" style="background:linear-gradient(135deg,#F4E8FF,#DDB8FF);border-color:#C080FF;" onclick="showEngRhymes()">
        <span class="mc-icon">🎵</span>
        <div class="mc-label" style="color:#600090;">Phonics 顺口溜</div>
        <div class="mc-desc">字母儿歌·发音口诀</div>
      </div>
    </div>
  </div>
  <!-- ══ TAB: 拼音 ══ -->
  <div class="home-tab-panel" id="tab-pinyin">
    <div class="subject-modules" style="padding-top:16px">
      <div class="module-card" style="background:linear-gradient(135deg,#FFF8E0,#FFF0B0);border-color:#FFD700;" onclick="goPinyin('initials')">
        <span class="mc-icon">🔡</span>
        <div class="mc-label" style="color:#A07000;">声母 &amp; 韵母</div>
        <div class="mc-desc">b p m f … a o e i u</div>
      </div>
      <div class="module-card" style="background:linear-gradient(135deg,#FFF0E8,#FFD8B8);border-color:#FFA060;" onclick="goPinyin('tones')">
        <span class="mc-icon">🎵</span>
        <div class="mc-label" style="color:#C04000;">声调练习</div>
        <div class="mc-desc">一二三四声</div>
      </div>
      <div class="module-card" style="background:linear-gradient(135deg,#E8FFF0,#CCFFE0);border-color:#80E8A0;" onclick="goPinyin('blend')">
        <span class="mc-icon">➕</span>
        <div class="mc-label" style="color:#006030;">拼读练习</div>
        <div class="mc-desc">声母＋韵母＝音节</div>
      </div>
      <div class="module-card" style="background:linear-gradient(135deg,#F0E8FF,#DDB8FF);border-color:#B080FF;" onclick="goPinyin('songs')">
        <span class="mc-icon">🎶</span>
        <div class="mc-label" style="color:#600090;">拼音儿歌</div>
        <div class="mc-desc">声调歌·ü儿歌</div>
      </div>
    </div>
  </div>
  <!-- ══ TAB: 汉字 ══ -->
  <div class="home-tab-panel" id="tab-chinese">
    <div class="subject-modules" style="padding-top:16px">
      <div class="module-card full" style="background:linear-gradient(135deg,#FFF0F0,#FFD0D0);border-color:#FF8080;" onclick="goHanzi('cards')">
        <span class="mc-icon">📖</span>
        <div class="mc-label" style="color:#A00020;">汉字卡片</div>
        <div class="mc-desc">看字认读，听拼音，学组词</div>
      </div>
      <div class="module-card" style="background:linear-gradient(135deg,#FFF8E0,#FFF0B0);border-color:#FFD700;" onclick="goHanzi('stroke')">
        <span class="mc-icon">✏️</span>
        <div class="mc-label" style="color:#806000;">笔画顺序</div>
        <div class="mc-desc">动画演示</div>
      </div>
      <div class="module-card" style="background:linear-gradient(135deg,#E8F4FF,#D0E8FF);border-color:#85BEF5;" onclick="goHanziQuiz()">
        <span class="mc-icon">🔍</span>
        <div class="mc-label" style="color:var(--blue);">看图猜字</div>
        <div class="mc-desc">4选1小测验</div>
      </div>
    </div>
  </div>
  <!-- ══ TAB: 数学 ══ -->
  <div class="home-tab-panel" id="tab-math">
    <div class="subject-modules" style="padding-top:16px">
      <div class="module-card" style="background:linear-gradient(135deg,#EDFFF0,#C8F8D0);border-color:#60C870;" onclick="startMathGame(10)">
        <span class="mc-icon" style="font-size:40px;">🟢</span>
        <div class="mc-label" style="color:#006020;font-size:15px;">10 以内</div>
        <div class="mc-desc" style="font-size:11px;">加法 &amp; 减法</div>
      </div>
      <div class="module-card" style="background:linear-gradient(135deg,#E8F4FF,#C8EEFF);border-color:#70B8FF;" onclick="startCompareGame()">
        <span class="mc-icon" style="font-size:40px;">⚖️</span>
        <div class="mc-label" style="color:#003870;font-size:15px;">比大小</div>
        <div class="mc-desc" style="font-size:11px;">符号 &amp; 填空</div>
      </div>
      <div class="module-card" style="background:linear-gradient(135deg,#FFF8E0,#FFE8A0);border-color:#FFD700;" onclick="startMathGame(20)">
        <span class="mc-icon" style="font-size:40px;">🌟</span>
        <div class="mc-label" style="color:#806000;font-size:15px;">20 以内</div>
        <div class="mc-desc" style="font-size:11px;">进阶挑战</div>
      </div>
      <div class="module-card" style="background:linear-gradient(135deg,#FFE8E8,#FFB8B8);border-color:#FF8080;" onclick="startMathGame(100)">
        <span class="mc-icon" style="font-size:40px;">🏆</span>
        <div class="mc-label" style="color:#800020;font-size:15px;">100 以内</div>
        <div class="mc-desc" style="font-size:11px;">数学小达人</div>
      </div>
      <div class="module-card" style="background:linear-gradient(135deg,#FFF0E8,#FFD8B8);border-color:#FFA060;" onclick="showPage('math-rhyme')">
        <span class="mc-icon" style="font-size:40px;">🎵</span>
        <div class="mc-label" style="color:#C04000;font-size:15px;">加减法口诀</div>
        <div class="mc-desc" style="font-size:11px;">10以内顺口溜</div>
      </div>
      <div class="module-card" style="background:linear-gradient(135deg,#E8F4FF,#C8EEFF);border-color:#70C8F0;" onclick="showPage('math-times')">
        <span class="mc-icon" style="font-size:40px;">✖️</span>
        <div class="mc-label" style="color:#0060A0;font-size:15px;">乘法口诀表</div>
        <div class="mc-desc" style="font-size:11px;">99乘法口诀</div>
      </div>
    </div>
  </div>
</template>

<template id="tpl-result">
  <div class="result-wrap">
    <span class="result-trophy" id="result-trophy">🏆</span>
    <div class="result-title" id="result-title">太棒了！</div>
    <div class="result-sub" id="result-sub">你答对了</div>
    <div class="result-score" id="result-score">8 / 10</div>
    <div class="result-stars" id="result-stars">⭐⭐⭐</div>
    <button class="result-btn" onclick="replayGame()" id="result-replay-btn">再来一次 🔄</button>
    <button class="result-btn-secondary" onclick="showPage('home')">回首页 🏠</button>
  </div>
</template>
