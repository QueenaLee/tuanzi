<!-- 汉字学科页面 -->
<template id="tpl-hanzi">
  <div class="topbar">
    <button class="back-btn" onclick="showPage('home')" aria-label="返回首页">←</button>
    <h2>字 认识汉字</h2>
  </div>
  <div id="hanzi-home">
    <div class="sub-menu">
      <div class="sub-card full" onclick="showSub('hanzi','cards')">
        <span class="sub-icon">📖</span>
        <div class="sub-label">汉字卡片</div>
        <div class="sub-desc">看字认读，听拼音，学组词</div>
      </div>
      <div class="sub-card" onclick="showSub('hanzi','stroke')">
        <span class="sub-icon">✏️</span>
        <div class="sub-label">笔画顺序</div>
        <div class="sub-desc">动画演示</div>
      </div>
      <div class="sub-card" onclick="startHanziQuiz()">
        <span class="sub-icon">🔍</span>
        <div class="sub-label">看图猜字</div>
        <div class="sub-desc">4选1小测验</div>
      </div>
    </div>
  </div>
  <!-- 汉字卡片 -->
  <div id="hanzi-cards" style="display:none">
    <div id="hz-grid" style="display:grid;grid-template-columns:repeat(2,1fr);gap:14px;padding:16px 20px;max-width:560px;margin:0 auto"></div>
    <div class="page-nav">
      <button class="page-btn" id="hz-prev" onclick="hzChangePage(-1)">‹</button>
      <div class="page-info" id="hz-page-info">1 / 1</div>
      <button class="page-btn" id="hz-next" onclick="hzChangePage(1)">›</button>
    </div>
  </div>
  <!-- 笔画动画 -->
  <div id="hanzi-stroke" style="display:none;padding:16px 20px 20px;max-width:520px;margin:0 auto">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
      <button class="page-btn" id="hz-stroke-prev" onclick="hzStrokeNav(-1)">‹</button>
      <div style="text-align:center">
        <div id="hz-stroke-char" style="font-size:64px;font-weight:900;color:var(--coral);line-height:1.1"></div>
        <div id="hz-stroke-page" style="font-size:13px;color:var(--muted);margin-top:2px"></div>
      </div>
      <button class="page-btn" id="hz-stroke-next" onclick="hzStrokeNav(1)">›</button>
    </div>
    <div class="stroke-canvas-wrap">
      <div id="hz-stroke-target" style="width:180px;height:180px"></div>
    </div>
    <div class="stroke-info" id="hz-stroke-info" style="text-align:center;margin:8px 0"></div>
    <div style="display:flex;gap:10px;margin-top:8px">
      <button class="song-play-btn" style="flex:1" onclick="hzReplayStroke()">▶ 重新播放</button>
    </div>
  </div>
  <!-- 看图猜字 -->
  <div id="hanzi-quiz" style="display:none">
    <div class="quiz-wrap">
      <div class="progress-bar-wrap">
        <div class="progress-label" id="hz-quiz-label">第 1 题 / 共 10 题</div>
        <div class="progress-track"><div class="progress-fill" id="hz-quiz-fill" style="width:10%"></div></div>
      </div>
      <div class="quiz-question">
        <div class="q-label">这张图对应哪个汉字？</div>
        <div id="hz-quiz-emoji" style="font-size:80px;text-align:center;padding:8px 0"></div>
      </div>
      <div class="quiz-options" id="hz-quiz-opts" style="grid-template-columns:1fr 1fr"></div>
      <button class="quiz-next-btn" id="hz-quiz-next" onclick="hzQuizNext()" disabled style="margin-top:16px">下一题 →</button>
    </div>
  </div>
</template>
