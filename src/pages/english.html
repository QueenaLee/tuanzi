<!-- 英语学科页面集合: word-flash / quiz / match / flash / phonics / eng-rhymes -->
<template id="tpl-word-flash">
  <div class="topbar">
    <button class="back-btn" onclick="showPage('home')" aria-label="返回首页">←</button>
    <h2>📚⚡ 边学边记</h2>
  </div>
  <div class="cat-tabs" style="justify-content:center; background:transparent; border-bottom:none;">
    <button class="cat-tab active" id="wf-tab-words" onclick="wfSwitchTab('words')">📚 单词速记</button>
    <button class="cat-tab" id="wf-tab-sentences" onclick="wfSwitchTab('sentences')">💬 日常短句</button>
  </div>
  <div id="wf-words-panel">
    <div style="padding:10px 20px 2px; max-width:560px; margin:0 auto; font-size:13px; color:var(--muted); font-weight:600;">
      点 ⚡速记 按钮，对这个单词进行十秒速记
    </div>
    <div id="wf-grid" class="wf-grid"></div>
    <div class="page-nav">
      <button class="page-btn" id="wf-prev" onclick="wfChangePage(-1)" aria-label="上一页">‹</button>
      <div class="page-info" id="wf-page-info">1 / 2</div>
      <button class="page-btn" id="wf-next" onclick="wfChangePage(1)" aria-label="下一页">›</button>
    </div>
  </div>
  <div id="wf-sentences-panel" style="display:none;">
    <div style="padding:10px 20px 2px; max-width:560px; margin:0 auto; font-size:13px; color:var(--muted); font-weight:600;">
      点英文短句可朗读，点 ⚡速记 进行十秒速记
    </div>
    <div id="wf-ds-grid" class="wf-grid"></div>
    <div class="page-nav">
      <button class="page-btn" id="wf-ds-prev" onclick="wfDsChangePage(-1)" aria-label="上一页">‹</button>
      <div class="page-info" id="wf-ds-page-info">1 / 2</div>
      <button class="page-btn" id="wf-ds-next" onclick="wfDsChangePage(1)" aria-label="下一页">›</button>
    </div>
  </div>
</template>

<template id="tpl-quiz">
  <div class="topbar">
    <button class="back-btn" onclick="showPage('home')" aria-label="返回首页">←</button>
    <h2>🎯 看词选图</h2>
  </div>
  <div class="quiz-wrap">
    <div class="progress-bar-wrap">
      <div class="progress-label" id="quiz-progress-label">第 1 题 / 共 10 题</div>
      <div class="progress-track"><div class="progress-fill" id="quiz-progress-fill" style="width:10%"></div></div>
    </div>
    <div class="quiz-question">
      <div class="q-label">这个单词是什么意思？</div>
      <div class="q-word" id="quiz-word">apple</div>
      <div class="q-sound" onclick="speakWord()" title="听读音">🔊</div>
    </div>
    <div class="quiz-options" id="quiz-opts"></div>
    <button class="quiz-next-btn" id="quiz-next" onclick="quizNext()" disabled>下一题 →</button>
  </div>
</template>

<template id="tpl-match">
  <div class="topbar">
    <button class="back-btn" onclick="showPage('home')" aria-label="返回首页">←</button>
    <h2>🧩 配对消除</h2>
  </div>
  <div class="match-wrap">
    <div class="match-score" id="match-score">已消除：0 / 8 对</div>
    <div class="match-round-info" id="match-round-info">点左边单词，再点右边图片，配对！</div>
    <div class="match-board"></div>
  </div>
</template>

<template id="tpl-flash">
  <div class="topbar">
    <button class="back-btn" onclick="flashStop(); showPage('home')" aria-label="返回首页">←</button>
    <h2>⚡ 十秒速记</h2>
  </div>
  <!-- 分类选择区 -->
  <div id="flash-cat-screen" style="padding:20px;max-width:480px;margin:0 auto;">
    <div style="display:flex;flex-direction:column;gap:14px;" id="flash-cat-list"></div>
  </div><div id="flash-main" style="display:none;">
    <!-- 进度 -->
    <div style="padding:12px 20px 0; max-width:560px; margin:0 auto;">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:6px;">
        <span style="font-size:14px;font-weight:700;color:var(--muted);" id="flash-prog-label">第 1 / 6 词</span>
        <span id="flash-phase-badge" class="flash-phase-badge phase-syllable">音节拆读</span>
      </div>
      <div class="progress-track"><div class="progress-fill" id="flash-prog-fill" style="width:16%"></div></div>
    </div>
    <!-- 单词大卡 -->
    <div id="flash-card" style="padding:16px 20px; max-width:560px; margin:0 auto;">
      <div class="flash-word-card">
        <!-- Emoji 图 -->
        <div id="flash-emoji" class="flash-big-emoji">🍎</div>
        <!-- 英文单词（音节高亮版 / 完整版切换） -->
        <div id="flash-syllable-display" class="flash-syllable-row"></div>
        <!-- 完整单词（复读阶段显示） -->
        <div id="flash-word-full" class="flash-word-full" style="display:none;">apple</div>
        <!-- 中文 -->
        <div id="flash-zh" class="flash-zh-text">苹果</div>
        <!-- 阶段说明 -->
        <div id="flash-hint" class="flash-hint-text">跟我一起读每个音节 👇</div>
        <!-- 复读计数圆点 -->
        <div id="flash-dots" class="flash-dots-row" style="display:none;"></div>
        <!-- 倒计时环 -->
        <div id="flash-timer-wrap" class="flash-timer-wrap" style="display:none;">
          <svg class="flash-timer-svg" viewBox="0 0 100 100">
            <circle cx="50" cy="50" r="42" fill="none" stroke="#EEE" stroke-width="8"/>
            <circle id="flash-timer-arc" cx="50" cy="50" r="42" fill="none"
              stroke="var(--orange)" stroke-width="8"
              stroke-dasharray="263.9" stroke-dashoffset="0"
              stroke-linecap="round" transform="rotate(-90 50 50)"/>
          </svg>
          <div id="flash-timer-num" class="flash-timer-num">10</div>
        </div>
      </div>
    </div>
    <!-- 底部按钮区 -->
    <div style="padding:0 20px; max-width:560px; margin:0 auto; display:flex; gap:12px;">
      <button id="flash-skip-btn" class="flash-action-btn flash-btn-skip" onclick="flashSkip()">跳过 ⏭</button>
      <button id="flash-replay-btn" class="flash-action-btn flash-btn-replay" onclick="flashReplayCurrent()">再听一遍 🔊</button>
    </div>
  </div>
</template>

<template id="tpl-phonics">
  <div class="topbar">
    <button class="back-btn" onclick="showPage('home')" aria-label="返回首页">←</button>
    <h2>🔤 自然拼读 Phonics</h2>
  </div>
  <div id="phonics-home">
    <div class="sub-menu">
      <div class="sub-card" onclick="showSub('phonics','sounds')">
        <span class="sub-icon">🔤</span>
        <div class="sub-label">字母发音</div>
        <div class="sub-desc">A=/æ/ B=/b/ …</div>
      </div>
      <div class="sub-card" onclick="showSub('phonics','blends')">
        <span class="sub-icon">🔗</span>
        <div class="sub-label">字母组合</div>
        <div class="sub-desc">sh ch th bl gr…</div>
      </div>
      <div class="sub-card" onclick="showSub('phonics','vowels')">
        <span class="sub-icon">🅰️</span>
        <div class="sub-label">元音规则</div>
        <div class="sub-desc">短元音·长元音·CVCe</div>
      </div>
      <div class="sub-card" onclick="showSub('phonics','cvc')">
        <span class="sub-icon">🔡</span>
        <div class="sub-label">CVC 拼读</div>
        <div class="sub-desc">cat dog big…</div>
      </div>
      <div class="sub-card full" onclick="showSub('phonics','songs')">
        <span class="sub-icon">🎵</span>
        <div class="sub-label">Phonics 顺口溜</div>
        <div class="sub-desc">字母儿歌·发音口诀</div>
      </div>
    </div>
  </div>
  <!-- 字母发音 -->
  <!-- 字母发音 + 字母组合 合并页 -->
  <div id="phonics-letters" style="display:none">
    <div style="display:flex;gap:8px;padding:12px 16px;background:white;border-bottom:2px solid #EEE;overflow-x:auto;scrollbar-width:none">
      <button class="cat-tab active" id="phl-tab-sounds" onclick="phlSelectTab('sounds')">🔤 字母发音 A-Z</button>
      <button class="cat-tab" id="phl-tab-digraphs" onclick="phlSelectTab('digraphs')">🔗 Digraphs</button>
      <button class="cat-tab" id="phl-tab-blends" onclick="phlSelectTab('blends')">✨ Blends</button>
    </div>
    <div id="phl-sounds-panel">
      <div id="phl-letter-grid" class="ph-letter-grid"></div>
    </div>
    <div id="phl-blend-panel" style="display:none">
      <div id="phl-blend-grid" class="ph-blend-grid"></div>
    </div>
    <button class="quiz-next-btn" style="margin:8px 20px 16px;width:calc(100% - 40px)" onclick="showPage('home')">← 返回首页</button>
  </div>
  <!-- 元音规则 -->
  <div id="phonics-vowels" style="display:none;padding:16px 20px 20px">
    <div id="ph-vowel-content"></div>
    <button class="quiz-next-btn" style="margin-top:12px" onclick="showSub('phonics','home')">← 返回</button>
  </div>
  <!-- CVC 练习 -->
  <div id="phonics-cvc" style="display:none">
    <div class="quiz-wrap">
      <div class="progress-bar-wrap">
        <div class="progress-label" id="cvc-prog-label">第 1 题 / 共 10 题</div>
        <div class="progress-track"><div class="progress-fill" id="cvc-prog-fill" style="width:10%"></div></div>
      </div>
      <div class="ph-cvc-display">
        <div style="font-size:14px;color:var(--muted);margin-bottom:12px;font-weight:600">拼出这个单词</div>
        <div class="ph-cvc-letters" id="cvc-letters"></div>
        <div style="font-size:36px;margin-top:10px;cursor:pointer" onclick="speakWordText(cvcCurrent)">🔊</div>
      </div>
      <div class="quiz-options" id="cvc-opts"></div>
      <button class="quiz-next-btn" id="cvc-next" onclick="cvcNext()" disabled style="margin-top:16px">下一题 →</button>
    </div>
  </div>
  <!-- 顺口溜 -->
  <div id="phonics-songs" style="display:none;padding-bottom:20px">
    <div id="ph-songs-list"></div>
    <button class="quiz-next-btn" style="margin:0 20px;width:calc(100% - 40px)" onclick="showSub('phonics','home')">← 返回</button>
  </div>
</template>

<template id="tpl-eng-rhymes">
  <div class="topbar">
    <button class="back-btn" onclick="showPage('home')" aria-label="返回首页">←</button>
    <h2>🎵 Phonics 顺口溜</h2>
  </div>
  <div style="padding:14px 20px 20px; max-width:520px; margin:0 auto;" id="eng-rhymes-list"></div>
</template>
